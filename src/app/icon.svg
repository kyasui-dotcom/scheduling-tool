<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Calendar body -->
  <rect x="2" y="6" width="28" height="24" rx="4" fill="#6366f1"/>
  <!-- Top bar -->
  <rect x="2" y="6" width="28" height="8" rx="4" fill="#4f46e5"/>
  <rect x="2" y="10" width="28" height="4" fill="#4f46e5"/>
  <!-- Hooks -->
  <rect x="9" y="3" width="3" height="6" rx="1.5" fill="#4f46e5"/>
  <rect x="20" y="3" width="3" height="6" rx="1.5" fill="#4f46e5"/>
  <!-- Grid dots (dates) -->
  <rect x="7" y="17" width="4" height="3" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="14" y="17" width="4" height="3" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="21" y="17" width="4" height="3" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="7" y="23" width="4" height="3" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="14" y="23" width="4" height="3" rx="1" fill="white"/>
  <rect x="21" y="23" width="4" height="3" rx="1" fill="rgba(255,255,255,0.4)"/>
</svg>
